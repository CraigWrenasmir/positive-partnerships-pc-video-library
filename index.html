<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Positive Partnerships Video Library</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">Positive Partnerships</p>
        <h1>PC Workshop Video Library</h1>
        <p class="intro">
          Browse the current transcript-backed video library for <strong>1 Day PC</strong> and
          <strong>2 Day PC</strong>. Open a transcript directly in the page and keep the dataset
          ready for later summary work.
        </p>
      </header>

      <main class="library-panel">
        <div class="toolbar">
          <div class="workshop-switch" id="workshop-switch"></div>
          <div class="toolbar-meta" id="toolbar-meta"></div>
        </div>

        <div class="video-list" id="video-list"></div>
      </main>
    </div>

    <template id="video-card-template">
      <article class="video-card">
        <div class="video-card-top">
          <div>
            <p class="video-card-kicker"></p>
            <h3></h3>
          </div>
          <span class="duration-pill"></span>
        </div>
        <p class="speaker-line"></p>
        <p class="slide-line"></p>
        <div class="card-notes"></div>
        <div class="card-actions">
          <button class="primary-button transcript-button" type="button">Transcript</button>
          <button class="secondary-button summary-button" type="button" disabled>Summary Soon</button>
        </div>
        <div class="accordion-panel hidden">
          <div class="accordion-header">
            <div>
              <p class="transcript-kicker"></p>
              <h4 class="accordion-title"></h4>
              <p class="transcript-meta"></p>
            </div>
            <button class="ghost-button close-accordion-button" type="button">Close</button>
          </div>
          <div class="transcript-notes"></div>
          <div class="transcript-body"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
