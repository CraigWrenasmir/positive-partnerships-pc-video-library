<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Positive Partnerships PC Video Library</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Positive Partnerships</p>
          <h1>PC Workshop Video Library</h1>
          <p class="intro">
            A transcript-first library for the <strong>1 Day PC</strong> and <strong>2 Day PC</strong>
            workshops. Browse by session, open transcripts inline, and keep the content easy to scan for
            future translation work.
          </p>
        </div>
        <div class="hero-logo-panel">
          <img class="hero-logo" src="pp-square-logo.png" alt="Positive Partnerships logo">
        </div>
      </header>

      <main class="library-panel">
        <div class="toolbar">
          <div class="workshop-switch" id="workshop-switch"></div>
          <div class="toolbar-meta" id="toolbar-meta"></div>
        </div>

        <div class="session-list" id="video-list"></div>
      </main>
    </div>

    <template id="video-row-template">
      <article class="video-row">
        <div class="video-row-main">
          <div class="video-copy">
            <div class="video-heading">
              <h3 class="video-title"></h3>
            </div>
            <p class="video-slide"></p>
            <p class="video-brief"></p>
          </div>

          <div class="video-actions">
            <span class="duration-pill"></span>
            <button class="summary-button" type="button" disabled>Summary Soon</button>
            <button class="transcript-button" type="button">Open Transcript</button>
          </div>
        </div>

        <div class="transcript-drawer" hidden>
          <div class="transcript-head">
            <div>
              <p class="transcript-kicker"></p>
              <h4 class="transcript-title"></h4>
              <p class="transcript-meta"></p>
            </div>
            <button class="close-drawer" type="button">Close</button>
          </div>
          <div class="drawer-body"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
